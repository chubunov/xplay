<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xplay Сервис</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
        .order-item { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; cursor: pointer; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; }
        .status-active { background: #d1e7ff; color: #0d6efd; }
        .status-completed { background: #d1e7dd; color: #198754; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#" onclick="showDashboard()">Xplay Сервис</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showDashboard()">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showActiveOrders()">Активные заказы</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showNewOrderForm()">Новый договор</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showSearch()">Поиск</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showLogin()">Войти</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4" id="mainContent"></div>

    <!-- Модалка входа -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Вход</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="password" class="form-control" id="adminPassword" placeholder="Пароль">
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label">Запомнить</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="login()">Войти</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка нового заказа -->
    <div class="modal fade" id="orderModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Новый договор</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="orderForm">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label>Телефон</label>
                                <input type="text" class="form-control" id="phone" required>
                            </div>
                            <div class="col-md-6">
                                <label>ФИО клиента</label>
                                <input type="text" class="form-control" id="customerName" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label>Тип</label>
                                <select class="form-control" id="deviceType">
                                    <option>Игровая приставка</option>
                                    <option>Контроллер</option>
                                    <option>Другое</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label>Модель</label>
                                <input type="text" class="form-control" id="deviceModel">
                            </div>
                            <div class="col-md-4">
                                <label>S/N</label>
                                <input type="text" class="form-control" id="serialNumber">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Неисправность</label>
                            <textarea class="form-control" id="problem" rows="3" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-4">
                                <label>Стоимость</label>
                                <input type="text" class="form-control" id="estimatedPrice">
                            </div>
                            <div class="col-md-4">
                                <label>Гарантия</label>
                                <select class="form-control" id="warranty">
                                    <option>30 дней</option>
                                    <option>14 дней</option>
                                    <option>60 дней</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label>Предоплата</label>
                                <input type="text" class="form-control" id="prepayment">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="saveOrder()">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
